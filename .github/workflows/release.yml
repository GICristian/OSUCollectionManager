# Push tag v*.*.*: build Windows, installer Inno Setup, GitHub Release cu un singur .exe (Setup).
# version.py = tag (ex. v0.4.2 <-> __version__ = "0.4.2").

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches osc_collector/version.py
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref -notmatch '^v(.+)$') {
            Write-Error "Unexpected ref: $ref"
            exit 1
          }
          $tagVer = $Matches[1]
          $raw = Get-Content -Path "osc_collector\version.py" -Raw -Encoding utf8
          if ($raw -notmatch '__version__\s*=\s*"([^"]+)"') {
            Write-Error "Cannot parse __version__ in version.py"
            exit 1
          }
          $pyVer = $Matches[1]
          if ($pyVer -ne $tagVer) {
            Write-Error "Tag is v$tagVer but version.py has __version__ = `"$pyVer`". Bump version.py then tag v$pyVer."
            exit 1
          }
          "VER=$tagVer" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: venv and Python dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\pip install --upgrade pip
          .\.venv\Scripts\pip install -r requirements.txt -r requirements-dev.txt

      - name: Build (PyInstaller + self-contained Realm tool)
        shell: pwsh
        run: .\build_exe.ps1

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $candidates = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          )
          $iscc = $candidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $iscc) {
            Write-Error "ISCC.exe not found after choco install innosetup"
            exit 1
          }
          "ISCC=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Compile Windows installer
        shell: pwsh
        run: |
          $iscc = $env:ISCC
          New-Item -ItemType Directory -Path "installer\Output" -Force | Out-Null
          & $iscc /DMyAppVersion=$env:VER /Q "installer\OSC_Setup.iss"
          $setup = "installer\Output\OSC_${env:VER}_Setup.exe"
          if (-not (Test-Path -LiteralPath $setup)) {
            Write-Error "Missing $setup"
            exit 1
          }
          (Get-Item $setup).Length
          Copy-Item -LiteralPath $setup -Destination "OSC_${env:VER}_Setup.exe"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OSC ${{ github.ref_name }}
          files: OSC_${{ env.VER }}_Setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
